name: SnapDesk
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.snapdesk

targets:
  SnapDesk:
    type: application
    platform: macOS
    sources:
      - SnapDesk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapdesk.SnapDesk
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_KEY_LSUIElement: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: SnapDesk
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
